[package]
name = "sublime-text"
description = "A sophisticated text editor for code, markup and prose."
cli_name = "subl"

[version]
url = "https://www.sublimetext.com/download"
pattern = 'Build\s+(\d+)'

[download]
url = "https://download.sublimetext.com/sublime_text_build_{version}_x64.tar.xz"

[download.verify]
type = "gpg"
signature_url = "https://download.sublimetext.com/sublime_text_build_{version}_x64.tar.xz.asc"
pubkey_url = "https://download.sublimetext.com/sublimehq-pub.gpg"

[install]
target_dir = "~/.local/opt/sublime_text"
strip_components = 1
executable_path = "sublime_text"
additional_executables = ["crash_handler"]

[integration]
desktop_file = "sublime_text.desktop"
icon = "Icon/256x256/sublime-text.png"
